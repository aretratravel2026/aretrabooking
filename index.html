    const privateTourPricing = {
      "Daily Izmir Tour": { 1: 410, 2: 230, 3: 180, 4: 180, "5-10": 130 },
      "Ephesus Tour": { 1: 505, 2: 305, 3: 255, 4: 225, "5-10": 195 },
      "Pergamum Tour": { 1: 490, 2: 290, 3: 240, 4: 210, "5-10": 180 },
      "Pamukkale & Hierapolis Tour": { 1: 620, 2: 350, 3: 280, 4: 260, "5-10": 230 },
      "Cesme & Alacati Tour": { 1: 485, 2: 270, 3: 200, 4: 160, "5-10": 140 },
      "Urla Wine Tour": { 1: 490, 2: 270, 3: 195, 4: 165, "5-10": 150 },
      "Jewish Heritage Tour": { 1: 485, 2: 270, 3: 200, 4: 160, "5-10": 140 },
      "Priene Miletus and Didyma Tour": { 1: 610, 2: 340, 3: 270, 4: 250, "5-10": 220 }
    };

    const groupTourPricing = {
      "Efes Group Tour": 165,
      "Pergamum Group Tour": 150,
      "Izmir Group Tour": 150
    };

    const transferPricing = {
      "Mercedes Vito (1-6 Pax)": 55,
      "Mercedes Sprinter (7-14 Pax)": 80
    };

    const steps = ["Personal Info", "Service & Details", "Summary & Confirm"];

    function App() {
      const [step, setStep] = useState(0);
      const [submitted, setSubmitted] = useState(false);
      const [tourCategory, setTourCategory] = useState("private");
      const [pricing, setPricing] = useState({ net: 0, vat: 0, total: 0 });

      const [form, setForm] = useState({
        firstName: "", lastName: "", phone: "", email: "", nationality: "",
        privateTour: "", groupTour: "", transferType: "", vehicle: "",
        date: "", pax: "1",
        pickupTime: "", pickupLocation: "", dropoffLocation: "",
        notes: "", kvkk: false
      });

      const setField = (key) => (val) => setForm((f) => ({ ...f, [key]: val }));

      const currentServiceName =
        tourCategory === "private" ? form.privateTour :
        tourCategory === "group" ? form.groupTour : form.transferType;

      useEffect(() => {
        let net = 0, vat = 0, total = 0;
        const pax = parseInt(form.pax || "1", 10);
        if (tourCategory === "private" && form.privateTour) {
          const table = privateTourPricing[form.privateTour];
          let pp = pax >= 1 && pax <= 4 ? table[pax] : table["5-10"];
          total = pp * pax; net = total;
        } else if (tourCategory === "group" && form.groupTour) {
          total = (groupTourPricing[form.groupTour] || 0) * pax; net = total;
        } else if (tourCategory === "transfer" && form.vehicle) {
          net = transferPricing[form.vehicle] || 0;
          vat = net * 0.20; total = net + vat;
        }
        setPricing({ net, vat, total });
      }, [tourCategory, form.privateTour, form.groupTour, form.vehicle, form.pax]);

      const isStep0Valid = form.firstName && form.lastName && form.phone && form.email;
      const isStep1Valid =
        tourCategory === "private" ? form.privateTour && form.date && form.pax :
        tourCategory === "group" ? form.groupTour && form.date && form.pax :
        form.transferType && form.vehicle && form.date && form.pickupLocation && form.dropoffLocation;

      const handleWhatsAppSend = () => {
        const lines = [
          "ARETRA TRAVEL BOOKING REQUEST",
          "-----------------------------",
          `Category: ${tourCategory === "private" ? "Private Tour" : tourCategory === "group" ? "Group Tour" : "Transfer"}`,
          `Service: ${currentServiceName || "-"}`,
          `Date: ${form.date || "-"}`,
          tourCategory === "transfer" ? `Time: ${form.pickupTime || "-"}` : `Pax: ${form.pax}`,
          tourCategory === "transfer" ? `Vehicle: ${form.vehicle || "-"}` : "",
          tourCategory === "transfer" ? `Pickup: ${form.pickupLocation || "-"}` : "",
          tourCategory === "transfer" ? `Drop-off: ${form.dropoffLocation || "-"}` : "",
          "",
          `Guest: ${form.firstName} ${form.lastName}`,
          `Phone: ${form.phone}`,
          `Email: ${form.email}`,
          form.nationality ? `Nationality: ${form.nationality}` : "",
          form.notes ? `Notes: ${form.notes}` : "",
          "",
          `Total: €${pricing.total.toFixed(2)}`,
          tourCategory === "transfer" ? "(+20% VAT included)" : "(VAT included)"
        ].filter(Boolean);
        const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(lines.join("\n"))}`;
        window.open(url, "_blank");
        setSubmitted(true);
      };

      const inputCls = "bg-white border border-[#d4b89a] rounded-xl px-3 py-2 text-sm w-full focus:outline-none focus:border-[#6b3020] text-[#3b1c12]";
      const selectCls = inputCls + " cursor-pointer";

      if (submitted) return (
        <div className="min-h-screen flex items-center justify-center px-4" style={{backgroundColor:"#f5f0eb"}}>
          <div className="bg-white border border-[#d4b89a] rounded-3xl p-10 max-w-md w-full text-center shadow-lg">
            <div className="text-5xl mb-4" style={{color:"#6b3020"}}>✓</div>
            <h2 className="text-xl font-semibold tracking-wide mb-2" style={{color:"#3b1c12"}}>Request Sent via WhatsApp</h2>
            <p className="text-sm mb-6" style={{color:"#7a5c4a"}}>
              Thank you, <strong>{form.firstName} {form.lastName}</strong>.<br/>
              Your request has been forwarded. We will contact you shortly.
            </p>
            <button onClick={() => window.location.reload()}
              className="px-8 py-2 rounded-full text-sm font-semibold"
              style={{backgroundColor:"#6b3020", color:"#fff8f3"}}>
              New Booking
            </button>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen flex items-center justify-center px-4 py-10" style={{backgroundColor:"#f5f0eb"}}>
          <div className="w-full max-w-3xl bg-white border border-[#d4b89a] rounded-3xl shadow-xl overflow-hidden">

            {/* HEADER */}
            <div className="px-8 pt-8 pb-6 text-center border-b border-[#e8d8c8]" style={{backgroundColor:"#fffaf6"}}>
              <img src={LOGO_SRC} alt="Aretra Travel" className="h-24 mx-auto mb-2 object-contain" />
              <p className="text-xs mt-1 tracking-widest uppercase" style={{color:"#9a7055"}}>Tailor-Made Tours & Private Transfers</p>
            </div>

            <div className="px-8 py-7">
              {/* STEPS */}
              <div className="flex justify-between mb-8">
                {steps.map((s, i) => (
                  <div key={s} className="flex-1 flex flex-col items-center">
                    <div className="w-8 h-8 rounded-full flex items-center justify-center text-xs font-semibold"
                      style={{
                        backgroundColor: i <= step ? "#6b3020" : "transparent",
                        color: i <= step ? "#fff8f3" : "#b09a88",
                        border: i <= step ? "none" : "1.5px solid #d4b89a"
                      }}>
                      {i+1}
                    </div>
                    <span className="mt-2 text-[10px] tracking-[0.15em] uppercase" style={{color:"#9a7055"}}>{s}</span>
                  </div>
                ))}
              </div>

              {/* STEP 0 */}
              {step === 0 && (
                <div className="space-y-4">
                  <h2 className="text-sm tracking-[0.2em] uppercase mb-2" style={{color:"#6b3020"}}>Guest Details</h2>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input placeholder="First Name *" className={inputCls} value={form.firstName} onChange={e => setField("firstName")(e.target.value)} />
                    <input placeholder="Last Name *" className={inputCls} value={form.lastName} onChange={e => setField("lastName")(e.target.value)} />
                  </div>
                  <input placeholder="Phone (with country code) *" className={inputCls} value={form.phone} onChange={e => setField("phone")(e.target.value)} />
                  <input placeholder="Email Address *" className={inputCls} value={form.email} onChange={e => setField("email")(e.target.value)} />
                  <input placeholder="Nationality" className={inputCls} value={form.nationality} onChange={e => setField("nationality")(e.target.value)} />
                </div>
              )}

              {/* STEP 1 */}
              {step === 1 && (
                <div className="space-y-5">
                  <h2 className="text-sm tracking-[0.2em] uppercase" style={{color:"#6b3020"}}>Service Selection</h2>

                  {/* TABS */}
                  <div className="flex border border-[#d4b89a] rounded-2xl p-1 text-[11px] font-semibold tracking-[0.14em] uppercase" style={{backgroundColor:"#fff8f3"}}>
                    {["private","group","transfer"].map(cat => (
                      <button key={cat} onClick={() => setTourCategory(cat)}
                        className="flex-1 py-2 rounded-xl transition"
                        style={{
                          backgroundColor: tourCategory === cat ? "#6b3020" : "transparent",
                          color: tourCategory === cat ? "#fff8f3" : "#9a7055"
                        }}>
                        {cat === "private" ? "Private Tours" : cat === "group" ? "Group Tours" : "Transfers"}
                      </button>
                    ))}
                  </div>

                  {tourCategory === "private" && (
                    <div className="space-y-4">
                      <select className={selectCls} value={form.privateTour} onChange={e => setField("privateTour")(e.target.value)}>
                        <option value="">Select Private Tour *</option>
                        {Object.keys(privateTourPricing).map(t => <option key={t} value={t}>{t}</option>)}
                      </select>
                      <div className="grid grid-cols-2 gap-4">
                        <input type="date" className={inputCls} value={form.date} onChange={e => setField("date")(e.target.value)} />
                        <input type="number" min="1" max="10" placeholder="Pax (1–10) *" className={inputCls} value={form.pax} onChange={e => setField("pax")(e.target.value)} />
                      </div>
                    </div>
                  )}

                  {tourCategory === "group" && (
                    <div className="space-y-4">
                      <select className={selectCls} value={form.groupTour} onChange={e => setField("groupTour")(e.target.value)}>
                        <option value="">Select Group Tour *</option>
                        {Object.keys(groupTourPricing).map(t => <option key={t} value={t}>{t}</option>)}
                      </select>
                      <div className="grid grid-cols-2 gap-4">
                        <input type="date" className={inputCls} value={form.date} onChange={e => setField("date")(e.target.value)} />
                        <input type="number" min="1" placeholder="Number of Guests *" className={inputCls} value={form.pax} onChange={e => setField("pax")(e.target.value)} />
                      </div>
                      <p className="text-[11px]" style={{color:"#9a7055"}}>Price per person · VAT included</p>
                    </div>
                  )}

                  {tourCategory === "transfer" && (
                    <div className="space-y-4">
                      <select className={selectCls} value={form.transferType} onChange={e => setField("transferType")(e.target.value)}>
                        <option value="">Select Transfer Route *</option>
                        <option>Izmir Airport to Hotel</option>
                        <option>Hotel to Izmir Airport</option>
                        <option>Other Regions Transfer</option>
                      </select>
                      <select className={selectCls} value={form.vehicle} onChange={e => setField("vehicle")(e.target.value)}>
                        <option value="">Select Vehicle *</option>
                        <option>Mercedes Vito (1-6 Pax)</option>
                        <option>Mercedes Sprinter (7-14 Pax)</option>
                      </select>
                      <div className="grid grid-cols-2 gap-4">
                        <input type="date" className={inputCls} value={form.date} onChange={e => setField("date")(e.target.value)} />
                        <input type="time" className={inputCls} value={form.pickupTime} onChange={e => setField("pickupTime")(e.target.value)} />
                      </div>
                      <div className="grid grid-cols-2 gap-4">
                        <input placeholder="Pickup Location *" className={inputCls} value={form.pickupLocation} onChange={e => setField("pickupLocation")(e.target.value)} />
                        <input placeholder="Drop-off Location *" className={inputCls} value={form.dropoffLocation} onChange={e => setField("dropoffLocation")(e.target.value)} />
                      </div>
                      <p className="text-[11px]" style={{color:"#9a7055"}}>Price per vehicle · +20% VAT will be added</p>
                    </div>
                  )}

                  <textarea placeholder="Notes / Flight details / Special requests" rows="3"
                    className={inputCls} value={form.notes} onChange={e => setField("notes")(e.target.value)} />

                  {/* PRICE BOX */}
                  <div className="border border-[#d4b89a] rounded-2xl px-4 py-3 text-sm" style={{backgroundColor:"#fff8f3"}}>
                    <div className="flex justify-between" style={{color:"#7a5c4a"}}><span>Net:</span><span>€{pricing.net.toFixed(2)}</span></div>
                    {tourCategory === "transfer" && (
                      <div className="flex justify-between" style={{color:"#7a5c4a"}}><span>VAT (20%):</span><span>€{pricing.vat.toFixed(2)}</span></div>
                    )}
                    <div className="flex justify-between pt-2 mt-2 font-semibold" style={{borderTop:"1px solid #d4b89a", color:"#3b1c12"}}>
                      <span>Total:</span><span>€{pricing.total.toFixed(2)}</span>
                    </div>
                    <p className="text-[10px] mt-1 text-right" style={{color:"#b09a88"}}>
                      {tourCategory === "transfer" ? "* +20% VAT applied" : "* VAT included"}
                    </p>
                  </div>
                </div>
              )}

              {/* STEP 2 */}
              {step === 2 && (
                <div className="space-y-5">
                  <h2 className="text-sm tracking-[0.2em] uppercase" style={{color:"#6b3020"}}>Review & Confirm</h2>
                  <div className="border border-[#d4b89a] rounded-2xl px-4 py-4 text-sm space-y-2" style={{backgroundColor:"#fff8f3"}}>
                    {[
                      ["Name", `${form.firstName} ${form.lastName}`],
                      ["Email", form.email],
                      ["Phone", form.phone],
                      form.nationality ? ["Nationality", form.nationality] : null,
                      ["Service", currentServiceName],
                      ["Date", form.date],
                      tourCategory !== "transfer" ? ["Pax", form.pax] : null,
                      tourCategory === "transfer" ? ["Vehicle", form.vehicle] : null,
                      tourCategory === "transfer" ? ["Pickup", form.pickupLocation] : null,
                      tourCategory === "transfer" ? ["Drop-off", form.dropoffLocation] : null,
                      form.notes ? ["Notes", form.notes] : null,
                    ].filter(Boolean).map(([label, val]) => (
                      <div key={label} className="flex justify-between">
                        <span style={{color:"#9a7055"}}>{label}</span>
                        <span style={{color:"#3b1c12"}}>{val}</span>
                      </div>
                    ))}
                    <div className="flex justify-between pt-2 mt-2 font-bold text-base" style={{borderTop:"1px solid #d4b89a", color:"#6b3020"}}>
                      <span>Total</span><span>€{pricing.total.toFixed(2)}</span>
                    </div>
                  </div>
                  <label className="flex items-start gap-3 text-[11px] cursor-pointer" style={{color:"#7a5c4a"}}>
                    <input type="checkbox" className="mt-1" checked={form.kvkk} onChange={e => setField("kvkk")(e.target.checked)} />
                    <span>I confirm that all information is correct and I agree to Aretra Travel's Terms & Conditions and Privacy Policy.</span>
                  </label>
                </div>
              )}

              {/* BUTTONS */}
              <div className="flex justify-between mt-8">
                {step > 0
                  ? <button onClick={() => setStep(step-1)} className="text-xs tracking-[0.18em] uppercase" style={{color:"#9a7055"}}>← Back</button>
                  : <span></span>
                }
                <button
                  onClick={() => step === 2 ? handleWhatsAppSend() : setStep(step+1)}
                  disabled={
                    (step === 0 && !isStep0Valid) ||
                    (step === 1 && !isStep1Valid) ||
                    (step === 2 && !form.kvkk)
                  }
                  className="px-8 py-3 rounded-full text-xs tracking-[0.2em] uppercase font-semibold transition"
                  style={{
                    backgroundColor: ((step===0&&!isStep0Valid)||(step===1&&!isStep1Valid)||(step===2&&!form.kvkk))
                      ? "#e8d8c8" : "#6b3020",
                    color: ((step===0&&!isStep0Valid)||(step===1&&!isStep1Valid)||(step===2&&!form.kvkk))
                      ? "#b09a88" : "#fff8f3",
                    cursor: ((step===0&&!isStep0Valid)||(step===1&&!isStep1Valid)||(step===2&&!form.kvkk))
                      ? "not-allowed" : "pointer"
                  }}>
                  {step === 2 ? "Send via WhatsApp" : "Next →"}
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
